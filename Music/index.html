// Criar containers com 2 playlists por linha
for (let i = 0; i < playlistButtons.length; i += 2) {

  const row = document.createElement("div");
  row.className = "container";

  for (let j = i; j < i + 2 && j < playlistButtons.length; j++) {

    const pl = playlistButtons[j];

    const a = document.createElement("a");
    a.href = "#";
    a.className = `video ${pl.className}`;
    a.innerHTML = `<h2>${pl.name}</h2>`;

    if (pl.isUpload) {
      a.onclick = () => uploadMusic();
    } else {
      a.onclick = () => showPlaylist(pl.name);
      a.onmousedown = () => startLock(a, pl.name);
      a.onmouseup = () => stopLock(a);
      a.onmouseleave = () => stopLock(a);
    }

    row.appendChild(a);
  }

  container.appendChild(row);
}

        function seek(event) {
            const progressBar = document.querySelector('.progress-container');
            const audio = document.getElementById('audioPlayer');
            const clickX = event.clientX - progressBar.getBoundingClientRect().left;
            const progressWidth = progressBar.offsetWidth;
            const newTime = (clickX / progressWidth) * audio.duration;

            audio.currentTime = newTime;
        }

        document.querySelector('.progress-container').addEventListener('click', seek);

        let lockTimeout; // Variável para rastrear o timeout do bloqueio

        function startLock(element, playlistName) {
    lockTimeout = setTimeout(() => {
        // Adiciona classe bloqueada
        element.classList.add('locked');
        
        // Define o conteúdo do botão com o título e o ícone
        element.innerHTML = `
            <h2>${playlistName}</h2>
            <span class="lock-icon">🔒</span>
        `;
        element.onclick = null; // Remove a ação de clique
    }, 1500); // Tempo para segurar
}

function stopLock(element) {
    // Cancela o timeout se o botão for solto antes do tempo
    clearTimeout(lockTimeout);
}

        const progressContainer = document.querySelector('.progress-container');
const progressBar = document.getElementById('progress-bar');
const progressDot = document.getElementById('progress-dot');
const audio = document.getElementById('audioPlayer');

// Função para atualizar a posição da bolinha e da barra
function updateProgress(event) {
    const rect = progressContainer.getBoundingClientRect();
    const offsetX = event.clientX - rect.left; // Posição do clique em relação ao container
    const width = rect.width; // Largura do container
    const percentage = Math.min(Math.max(offsetX / width, 0), 1); // Garante que o valor esteja entre 0 e 1

    progressBar.style.width = (percentage * 100) + '%'; // Atualiza a barra
    progressDot.style.left = (percentage * 100) + '%'; // Atualiza a bolinha

    // Atualiza o tempo do áudio
    audio.currentTime = percentage * audio.duration;
}

function updateProgressBar() {
    const audio = document.getElementById('audioPlayer');
    const progressBar = document.getElementById('progress-bar');
    const progressDot = document.getElementById('progress-dot'); // Adicione esta linha
    const currentTime = document.getElementById('current-time');
    const duration = document.getElementById('duration');

    if (audio.duration) {
        // Atualiza o tempo atual e a duração
        const progress = (audio.currentTime / audio.duration) * 100;
        progressBar.style.width = progress + '%';

        // Atualiza a posição da bolinha
        progressDot.style.left = progress + '%'; // Adiciona esta linha

        // Formata o tempo
        const formatTime = (time) => {
            const minutes = Math.floor(time / 60);
            const seconds = Math.floor(time % 60).toString().padStart(2, '0');
            return `${minutes}:${seconds}`;
        };

        currentTime.textContent = formatTime(audio.currentTime);
        duration.textContent = formatTime(audio.duration);
    }
}

// Adiciona o evento de clique
progressContainer.addEventListener('click', updateProgress);

document.addEventListener('mouseup', () => {

});

document.addEventListener('mousemove', (event) => {

    }
});

    if (playlists[playlistName] && playlists[playlistName].images) {
        currentImageIndex++;
        if (currentImageIndex >= playlists[playlistName].images.length) {
            currentImageIndex = 0; // Se alcançar a última imagem, volta para a primeira
        }

        const playlistImage = document.getElementById('playlistImage');
        playlistImage.src = playlists[playlistName].images[currentImageIndex];
    }
}

        function playMusic(index) {

    var track = currentPlaylist[index];

    var musicPlayer = document.getElementById('musicPlayer');
    var musicTitle = document.getElementById('musicTitle');
    var songName = document.getElementById('songName');
    var musicSource = document.getElementById('audioPlayer');

    musicTitle.textContent = track.title;
    songName.textContent = track.title;

    musicSource.src = track.file;
    musicSource.load();
    musicSource.play();

    musicPlayer.classList.add('show');

    currentSongTitle = track.title;
    document.title = currentSongTitle;

    currentTrackIndex = index;

    hideMusicSelection();
}

        // Função para avançar para a próxima música
function nextTrack() {
    if (!currentPlaylist || currentPlaylist.length === 0) return;

    // Incrementa o índice
    currentTrackIndex = (currentTrackIndex + 1) % currentPlaylist.length;
    playMusic(currentTrackIndex);
    changePlaylistImageRandom();
}

// Função para voltar para a música anterior
function previousTrack() {
    if (!currentPlaylist || currentPlaylist.length === 0) return;

    // Decrementa o índice, com wrap-around
    currentTrackIndex = (currentTrackIndex - 1 + currentPlaylist.length) % currentPlaylist.length;
    playMusic(currentTrackIndex);
    changePlaylistImageRandom();
}

function changePlaylistImageRandom() {
    const img = document.getElementById("playlistImage");
    const currentPlaylist = playlists[currentPlaylistName];

    if (!currentPlaylist || !currentPlaylist.images) return;

    const images = currentPlaylist.images;
    const randomIndex = Math.floor(Math.random() * images.length);

    img.src = images[randomIndex];
}

        // Função para lidar com eventos de controle de mídia
        function handleMediaKeyEvent(event) {
            switch (event.code) {
                case 'MediaPlayPause':
                    togglePlayPause();
                    break;
                case 'MediaNextTrack':
                    nextTrack();
                    break;
                case 'MediaPreviousTrack':
                    previousTrack();
                    break;
                default:
                    break;
            }
        }

        let currentIndex0 = 0;  // Índice atual do carrossel
const itensPorCarrossel = document.querySelectorAll(".musica-item").length;
const carousel = document.querySelector(".carousel");

function moverCarrossel(direcao) {
    if (direcao === 'next') {
        currentIndex0 = (currentIndex0 + 1) % itensPorCarrossel;
    } else {
        currentIndex0 = (currentIndex0 - 1 + itensPorCarrossel) % itensPorCarrossel;
    }

    const novoTransform = -currentIndex0 * 270;  // A largura dos itens + espaçamento
    carousel.style.transform = `translateX(${novoTransform}px)`;
}

function tocarMusica(caminho) {
    // Obter o elemento do player e do áudio
    const audio = document.getElementById('audioPlayer');
    const player = document.getElementById('musicPlayer');
    
    // Se o player e o áudio não existirem, não faz sentido continuar
    if (!audio || !player) {
        console.error("Elemento de áudio ou player não encontrado!");
        return;
    }

    // Atualizar o caminho da música no player
    audio.src = caminho;

    // Exibir o player se estiver escondido
    player.style.display = 'block';

    // Iniciar a reprodução
    audio.play();

    // Atualizar o título da música no player
    const songName = caminho.split('/').pop().replace(/_/g, " ").replace(".mp3", "");
    document.getElementById('songName').textContent = songName;

    // Atualizar a imagem da playlist (aqui você pode adicionar uma lógica para mudar a imagem da playlist, se necessário)
    document.getElementById('playlistImage').src = "https://i.scdn.co/image/ab67616d0000b273afeb818f0641df8a027bb91b";  // Substitua com a URL da imagem correta (opcional)
    document.getElementById('currentPlaylistTitle').textContent = "Escolhas rápidas";  // Substitua com o nome da playlist (opcional)
}

// Adicionar o evento de click para tocar a música ao clicar no carrossel
document.querySelectorAll('.musica-item h3').forEach(function(item) {
    item.addEventListener('click', function() {
        const caminho = item.getAttribute('data-caminho');
        if (caminho) {
            tocarMusica(caminho);
        } else {
            console.warn("Caminho da música não encontrado!");
        }
    });
});

// Adicionando o evento de click dinamicamente
document.querySelectorAll('.musica-item h3').forEach(function(item) {
    item.addEventListener('click', function() {
        tocarMusica(item.getAttribute('data-caminho'));
    });
});
