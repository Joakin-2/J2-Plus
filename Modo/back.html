<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="/Script/img/2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Background</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: "Segoe UI", Arial, sans-serif;
}

body {
    overflow: hidden;
    background: black;
    color: white;
}

/* ---------------- FUNDO VÍDEO ---------------- */

#youtube-container,
#video-local {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

/* escurecimento elegante */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
    z-index: -1;
}

/* ---------------- CONTROLES ---------------- */

#controls {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    z-index: 10;
}

#controls button {
    padding: 10px 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    color: white;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
}

#controls button:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.2);
}

/* botão ativo */
#controls button.ativo {
    background: rgba(0, 200, 255, 0.4);
    box-shadow: 0 0 15px rgba(0, 200, 255, 0.6);
}

/* ---------------- LOADING ---------------- */

#loading-screen {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    font-size: 20px;
    letter-spacing: 2px;
}

/* ---------------- CONTEÚDO CENTRAL ---------------- */

#content-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
}

/* RELÓGIO */
#clock {
    font-size: 80px;
    font-weight: bold;
    letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.08);
    padding: 10px 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* DATA */
#date, #temperature-container {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    font-size: 22px;
    background: rgba(255,255,255,0.08);
    padding: 10px 20px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
}

/* ---------------- ANIMAÇÃO SUAVE ---------------- */

.fade {
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {
        opacity: 0;
        transform: scale(1.05);
    }
    to {
        opacity: 1;
        transform: scale(1);
    }
}
    </style>
</head>
    <body>

<div id="controls">
    <button id="btn-noite">🌙</button>
    <button id="btn-fundo">🎨</button>
</div>

<div id="loading-screen" style="display:none;">
    <h2>Deixe as luzes amarelas</h2>
</div>

<!-- Fundo Youtube -->
<div id="youtube-container">
    <iframe
        id="background-video"
        src=""
        frameborder="0"
        allow="autoplay"
        allowfullscreen>
    </iframe>
</div>

<!-- Vídeo local -->
<video id="video-local" autoplay loop muted style="display:none;">
    <source src="https://www.pexels.com/download/video/35730936/" type="video/mp4">
</video>


<div id="content-container">
    <div id="clock"></div>
    <div>
        <div id="date"></div>

        <div id="temperature-container">
            <div id="temperature"></div>
            <div id="weather-icon"></div>
        </div>
    </div>
</div>

<script>
        const btnNoite = document.getElementById("btn-noite");
const btnFundo = document.getElementById("btn-fundo");

const iframe = document.getElementById("background-video");
const videoLocal = document.getElementById("video-local");
const source = document.getElementById("background-source");

const loadingScreen = document.getElementById("loading-screen");

/* ---------------- ESTADO ---------------- */

let estado = "home";
let bloqueadoNoite = false;

/* ---------------- HOME ---------------- */

function abrirHome() {

    estado = "home";

    iframe.style.display = "none";


    videoLocal.src = "https://www.pexels.com/download/video/35730936/";
    videoLocal.style.display = "block";

    videoLocal.load();
    videoLocal.play();
}

/* ---------------- NOITE ---------------- */

function abrirNoite() {

    if (bloqueadoNoite) return;

    estado = "noite";
    bloqueadoNoite = true;

    iframe.style.display = "none";

    videoLocal.src = "https://www.pexels.com/download/video/10216808/";
    videoLocal.style.display = "block";

    videoLocal.load();
    videoLocal.play();

    setTimeout(() => {

        loadingScreen.style.display = "none";
        bloqueadoNoite = false;

    }, 3000);
}

function verificarBotaoNoite() {

    const hora = new Date().getHours();

    if (hora >= 17 || hora < 7) {
        btnNoite.style.display = "block";
    } else {
        btnNoite.style.display = "none";
    }
}

document.addEventListener("DOMContentLoaded", () => {

    abrirHome();

    verificarBotaoNoite(); // <- IMPORTANTE

    updateClock();
    updateDate();
    getTemperature();

    setInterval(updateClock, 1000);
    setInterval(updateDate, 60000);
    setInterval(getTemperature, 600000);

    // atualiza o botão todo minuto
    setInterval(verificarBotaoNoite, 60000);
});

/* ---------------- FUNDO ---------------- */

function abrirFundo() {

    estado = "fundo";

    videoLocal.style.display = "none";

    iframe.style.display = "block";

    atualizarFundoAutomatico();
}

/* ---------------- TOGGLE NOITE ---------------- */

btnNoite.addEventListener("click", () => {

    if (estado === "noite") {
        abrirHome();
    } else {
        abrirNoite();
    }
});

/* ---------------- TOGGLE FUNDO ---------------- */

btnFundo.addEventListener("click", () => {

    if (estado === "fundo") {
        abrirHome();
    } else {
        abrirFundo();
    }
});

/* ---------------- FUNDO YOUTUBE ---------------- */

function atualizarFundoAutomatico() {

    const hora = new Date().getHours();

    if (hora >= 23 || hora < 6) {

        iframe.style.display = "none";

        videoLocal.src = "https://www.pexels.com/download/video/855205/";
        videoLocal.style.display = "block";

        videoLocal.load();
        videoLocal.play();

    } else {

        iframe.style.display = "none";

        videoLocal.src = "https://www.pexels.com/download/video/7762080/";
        videoLocal.style.display = "block";

        videoLocal.load();
        videoLocal.play();
    }
}

/* ---------------- RELÓGIO ---------------- */

function updateClock() {

    const now = new Date();

    document.getElementById("clock").textContent =
        String(now.getHours()).padStart(2, "0") + ":" +
        String(now.getMinutes()).padStart(2, "0") + ":" +
        String(now.getSeconds()).padStart(2, "0");
}

/* ---------------- DATA ---------------- */

function updateDate() {

    const now = new Date();

    let data = now.toLocaleDateString("pt-BR", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric"
    });

    document.getElementById("date").textContent =
        data.replace("-feira", "");
}

/* ---------------- CLIMA ---------------- */

const apiKey = "bd2aa057407fb66d24136dab032d5bb8";
const city = "Jacupiranga";

async function getTemperature() {

    try {

        const response = await fetch(
            `https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${apiKey}&units=metric&lang=pt_br`
        );

        const data = await response.json();

        document.getElementById("temperature").textContent =
            Math.round(data.main.temp) + "°C";

        const icons = {
            Clear: "☀️",
            Clouds: "☁️",
            Rain: "🌧️",
            Snow: "❄️",
            Thunderstorm: "⛈️",
            Drizzle: "🌦️"
        };

        document.getElementById("weather-icon").textContent =
            icons[data.weather[0].main] || "🌥️";

    } catch (error) {
        console.error("Erro ao obter clima:", error);
    }
}

/* ---------------- INICIALIZAÇÃO ---------------- */

document.addEventListener("DOMContentLoaded", () => {

    abrirHome();

    updateClock();
    updateDate();
    getTemperature();

    setInterval(updateClock, 1000);
    setInterval(updateDate, 60000);
    setInterval(getTemperature, 600000);
});
    </script>
</body>
