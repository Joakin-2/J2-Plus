<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;

        color: #fff; /* Text color */
    }
    header {
        background-color: #1f1f1f; /* YouTube red */

        text-align: center;
    }
    .container {
    padding: 20px;
    display: inline-grid;
    grid-template-columns: repeat(4, 1fr);
    }

    /* Button styles */
    .button {
        display: inline-block;
        background-color: transparent;
        border: none;
        color: inherit;
        font: inherit;
        cursor: pointer;
        padding: 0;
        text-align: inherit;
        text-decoration: none; /* Remove underline */
    }

    .button:hover {
        text-decoration: none; /* Remove underline on hover */
        color: #ccc;
    }
    .video {
        position: relative;
        margin: 20px;
        width: 80%;
        background-color: #333; /* Darker background */
        padding: 10px;
        border-radius: 10px;
        color: #fff; /* Text color */
        text-decoration: none; /* Remove underline from anchor */
    }
    .video img {
        width: 100%;
        height: auto;
        border-radius: 5px;
    }
    .video h2 {
        margin: 5px 0;
    }
    .video p {
        margin: 0;
    }
    .channel-logo {
        display: block;
        margin-top: 10px;
        text-align: center;
    }
    .channel-logo img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
    }
    /* Hover effect */
    .video:hover {
        background-color: #444;
    }
    /* Password protection overlay */
    .password-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.8);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        border-radius: 10px;
        visibility: hidden;
        opacity: 0;
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .password-overlay.active {
        visibility: visible;
        opacity: 1;
    }
    .password-overlay p {
        font-size: 18px;
        margin: 0;
    }
    .password-overlay .input-group {
        display: flex;
        align-items: center;
        margin-top: 10px;
    }
    .password-overlay input {
        padding: 10px;
        font-size: 16px;
        border: 2px solid #555;
        border-radius: 5px;
        background: #1f1f1f;
        color: #fff;
        width: 150px; /* Adjust width as needed */
        margin-right: 10px; /* Space between input and button */
    }
    .password-overlay button {
        padding: 10px 20px;
        border: none;
        background-color: #ff0000; /* YouTube red */
        color: #fff;
        cursor: pointer;
        border-radius: 5px;
        font-size: 16px;
        transition: background-color 0.3s ease;
    }
    .password-overlay button:hover {
        background-color: #cc0000; /* Darker red */
    }
    .password-overlay #error-message {
        color: #ff0000; /* Red color for errors */
        margin-top: 10px;
    }
    /* Media Queries */
    @media screen and (max-width: 770px) {
        .video {
            width: 200px;
        }
    }
</style>
