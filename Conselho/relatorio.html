<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="Conselho.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatório</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #1e1e1e;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: grid;
            place-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #2b2b2b;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            padding: 20px;
            width: 90%;
            max-width: 800px;
            text-align: center;
        }

        #relogio {
            font-size: 24px;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
        }

        h1 {
            margin-bottom: 25px;
            padding: 20px 0;
        }

        select {
            width: 100%;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            margin-top: 5px;
        }

        section {
            display: grid;
            gap: 10px;
            text-align: left;
        }

        section label {
            font-weight: 600;
        }

        section input {
            width: 98%;
            padding: 8px;
            border: 1px solid #444;
            border-radius: 4px;
            font-size: 14px;
            background-color: #333;
            color: #f5f5f5;
            margin-top: 5px;
        }

        button {
            background-color: #000;
            color: #fff;
            border: none;
            padding: 10px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #131313;
        }

        .menu-relogio-container {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
}

        .resultado {
            background-color: #3a3a3a;
            padding: 15px;
            margin-top: 20px;
            border-radius: 5px;
            text-align: left;
        }

        .resultado h2 {
            color: #825dff;
        }

        .comemoracao {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    background-color: #b690f9;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    font-size: 16px;
    z-index: 1000;
    animation: aparecer 0.5s ease, desaparecer 0.5s ease 2.5s;
  }
    </style>
</head>
<body>
    <div class="container">
        <div class="menu-relogio-container">
            <h1>Conselho</h1>
            <p id="relogio"></p>
        </div>
        <div id="mensagem-xp"></div>
        <p id="xp-gain" style="display: none; color: #825dff; font-size: 18px; font-weight: bold;"></p>
        <section id="formulario">
            
            <label>Quantas vezes escovou os dentes hoje?</label>
            <select id="escovouDentes">
                <option value="3">3 vez</option>
                <option value="4">4 vezes</option>
                <option value="5">5 vezes</option>
            </select>

            <label>Quanto tempo de ensaio?</label>
            <select id="tempoEnsaio">
                <option value="5">5 minutos</option>
                <option value="10">10 minutos</option>
                <option value="20">20 minutos</option>
                <option value="30">30 minutos</option>
                <option value="60">1 hora</option>
            </select>

            <label id="labelTreino">Treinou hoje?</label>
            <select id="treino">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <label>Você orou?</label>
            <select id="oracao">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <label>Teve momento de leitura?</label>
            <select id="leitura">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <label>Leu a Bíblia?</label>
            <select id="biblia">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <label>Se alongou?</label>
            <select id="alongamento">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <label>Tomou os 4L de água?</label>
            <select id="agua">
                <option value="nao">Não</option>
                <option value="sim">Sim</option>
            </select>

            <button onclick="gerarRelatorio()">Gerar Relatório</button>
        </section>
        <div id="resultado" class="resultado" style="display: none;">
            <h2>Relatório Gerado</h2>
            <p><strong>Escovação:</strong> <span id="resEscovouDentes"></span></p>
            <p><strong>Tempo de Ensaio:</strong> <span id="resTempoEnsaio"></span></p>
            <p><strong>Treino:</strong> <span id="resTreino"></span></p>
            <p><strong>Oração:</strong> <span id="resOracao"></span></p>
            <p><strong>Leitura:</strong> <span id="resLeitura"></span></p>
            <p><strong>Leu a Bíblia:</strong> <span id="resBiblia"></span></p>
            <p><strong>Alongamento:</strong> <span id="resAlongamento"></span></p>
            <p><strong>Água:</strong> <span id="resAgua"></span></p>
            <p><strong>XP Ganhado:</strong> <span id="xpTotal"></span> XP</p>
            <p><strong>Classificação do Dia:</strong> <span id="classificacao"></span></p>
        </div>
    </div>
    <script src="/Script/perfil-data.js"></script>
    <script src="/Script/nivel.js"></script>
    <script>
        // Função para atualizar o relógio
        function atualizarRelogio() {
            const relogio = document.getElementById("relogio");
            const agora = new Date();
            const horas = String(agora.getHours()).padStart(2, '0');
            const minutos = String(agora.getMinutes()).padStart(2, '0');
            const segundos = String(agora.getSeconds()).padStart(2, '0');
            relogio.textContent = `${horas}:${minutos}:${segundos}`;
        }

        // Atualiza o relógio a cada segundo
        setInterval(atualizarRelogio, 1000);
        atualizarRelogio();
        
    function ganharXp(xp) {
    const perfil = perfis[perfilAtivo];

    perfil.xp += xp;

    const xpNecessario = 100 * perfil.nivel * perfil.nivel;

    if (perfil.xp >= xpNecessario) {
        perfil.xp -= xpNecessario;
        perfil.nivel++;
        mostrarComemoracao(`Parabéns, ${perfil.nome} subiu para o nível ${perfil.nivel}!`);
    }

    localStorage.setItem("xp" + perfilAtivo, perfil.xp);
    localStorage.setItem("nivel" + perfilAtivo, perfil.nivel);

    const xpGainElement = document.getElementById("xp-gain");
        xpGainElement.textContent = `+${xp} XP`;
        xpGainElement.style.display = "block";
    
        setTimeout(() => {
            xpGainElement.style.display = "none";
        }, 1500);

    atualizarInterface();
}

    function verificarDomingo() {
        const hoje = new Date();
        const diaSemana = hoje.getDay(); // 0 = Domingo

        const labelTreino = document.getElementById("labelTreino");

        if (diaSemana === 0) {
            labelTreino.textContent = "Foi à Escola Dominical?";
        }
    }

    verificarDomingo();
    
    function gerarRelatorio() {
        const escovouDentes = parseInt(document.getElementById("escovouDentes").value) || 0;
        const tempoEnsaio = parseInt(document.getElementById("tempoEnsaio").value) || 0;
        const treino = document.getElementById("treino").value === "sim";
        const oracao = document.getElementById("oracao").value === "sim";
        const leitura = document.getElementById("leitura").value === "sim";
        const biblia = document.getElementById("biblia").value === "sim";
        const alongamento = document.getElementById("alongamento").value === "sim";
        const agua = document.getElementById("agua").value === "sim";
    
        let respostasCorretas = 0;
        let xp = 0;
    
        if (escovouDentes >= 4) { 
    respostasCorretas++; 
    xp += 10; 
}

if (tempoEnsaio >= 10) { 
    respostasCorretas++; 
    xp += 20; 
}

        if (treino) { respostasCorretas++; xp += 10; }
        if (oracao) { respostasCorretas++; xp += 10; }
        if (leitura) { respostasCorretas++; xp += 10; }
        if (biblia) { respostasCorretas++; xp += 20; }
        if (alongamento) { respostasCorretas++; xp += 10; }
        if (agua) { respostasCorretas++; xp += 10; }
    
        const classificacoes = ["Vergonha", "Dia Ruim", "Dia Bom", "Dia Prime"];
        const classificacao = classificacoes[Math.min(respostasCorretas, 3)];
    
        document.getElementById("resEscovouDentes").textContent = escovouDentes;
        document.getElementById("resTempoEnsaio").textContent = tempoEnsaio;
        document.getElementById("resTreino").textContent = treino ? "Sim" : "Não";
        document.getElementById("resOracao").textContent = oracao ? "Sim" : "Não";
        document.getElementById("resLeitura").textContent = leitura ? "Sim" : "Não";
        document.getElementById("resBiblia").textContent = biblia ? "Sim" : "Não";
        document.getElementById("resAlongamento").textContent = alongamento ? "Sim" : "Não";
        document.getElementById("resAgua").textContent = agua ? "Sim" : "Não";
        document.getElementById("classificacao").textContent = classificacao;
        document.getElementById("xpTotal").textContent = xp;
        document.getElementById("resultado").style.display = "block";
    
        ganharXp(xp);
    }
    </script>
    
</body>
</html>
