<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="J2+.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Renovação</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: rgb(0, 0, 0); /* Cor de fundo mais escura */
            color: #fff; /* Texto em branco */
        }

        .container {
            display: flex;
            justify-content: center; 
            align-items: flex-start; /* Alinhamento no início */
            height: 100vh;
            text-align: center;
            width: 80%; /* Largura do container */
            margin: 0 auto; /* Centraliza o container na página */
        }

        .column {
            flex: 1; /* Cada coluna ocupa igual espaço */
            padding: 20px; /* Espaçamento interno */
            box-sizing: border-box; /* Inclui padding e border no tamanho total */
        }

        .row {
            display: grid; /* Utilizamos grid para organizar as imagens */
            grid-template-columns: 1fr; /* Uma coluna para as imagens */
            grid-gap: 20px; /* Espaço entre as colunas */
            margin-bottom: 20px; /* Margem inferior */
        }

        .image-container {
            text-align: center;
        }

        .image-container img {
            max-width: 620px; /* Garante que a imagem não ultrapasse o container */
            height: auto; /* Altura automática para manter proporção */
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        .image-container2 {
            text-align: center;
        }

        .image-container2 img {
            max-width: 418px; /* Garante que a imagem não ultrapasse o container */
            height: auto; /* Altura automática para manter proporção */
        }

        .botao {
            background-color: #f8fa9a;
            color: rgb(0, 0, 0);
            border: none;
            padding: 10px 12px; /* Ajustado o tamanho do botão */
            font-size: 24px;
            margin: 5px; /* Espaçamento entre os botões */
            cursor: pointer; 
            border-radius: 8px;
            transition: background-color 0.3s ease; /* Transição suave */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Sombra */
        }

        .botao:hover {
            background-color: #e0e05f; /* Cor ao passar o mouse */
        }

        .mensagem {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            color: white;
            padding: 10px;
            text-align: center;
        }

        .notes {
            width: 100%; /* Largura total */
            padding: 15px;
            border: 1px solid rgb(43, 42, 42);
            border-radius: 8px;
            resize: vertical;
            min-height: 250px;
            background-color: rgb(43, 42, 42); /* Cor de fundo das notas */
            color: white; /* Texto em branco */
            font-size: 16px; /* Tamanho da fonte */
            box-sizing: border-box; /* Inclui padding e border no tamanho total */
        }

        h1 {
            color: #f8fa9a; /* Cor do título */
        }

        .notes-container {
    position: relative;
    width: 1000px;
    max-width: 600px;
    margin: auto;
    background-color: rgb(43, 42, 42);
    border: 1px solid #ccc;
    border-radius: 8px;
    padding: 10px;
}

.btn, .btn-export, .btn-import {
    background-color: rgb(43, 42, 42);
    color: white;
    border: none;
    width: 40px;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

#timer {
            font-size: 2em;
            background-color: #000000;
            color: white;
            border-radius: 10px;
        }

        #startButton, #doneButton {
            font-size: 1.5em;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #f8fa9a;
            color: rgb(0, 0, 0);
            border: none;
            padding: 10px 12px; /* Ajustado o tamanho do botão */
            font-size: 24px;
            margin: 5px; /* Espaçamento entre os botões */
            cursor: pointer; 
            border-radius: 8px;
            transition: background-color 0.3s ease; /* Transição suave */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); /* Sombra */
        }
        .progress-container {
            margin-top: 20px;
            width: 80%;
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 30px;
            background-color: #4caf50;
            width: 0;
            text-align: center;
            color: white;
            line-height: 30px;
            font-size: 1em;
        }

        .status {
            color: white;
            margin-top: 10px;
        }

        .xp-gain {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #b382ed;
            font-size: 2em;
            font-weight: bold;
            animation: fade-out 1.5s forwards;
            pointer-events: none;
        }

        @keyframes fade-out {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -60%) scale(1.2);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="column">
            <div class="row">
                <div class="image-container">
                    <img id="image" src="Tabela.jpg" alt="Tabela de Estudos">
                </div>
            </div>

            <div id="timer">00:00:00</div>
        
        <div class="button-group" style="margin-bottom: 20px;"> 
            <button id="startButton">
                <i class="fas fa-play"></i> Iniciar
            </button>
            <button id="doneButton">
                <i class="fas fa-check-circle"></i> Feito
            </button>
        </div>
    
        <div id="xp-gain" class="xp-gain" style="display: none;">+10 XP</div>
            <div class="notes-container">
                <div class="button-group" style="display: none;"> 
                    <button class="btn-export" onclick="exportNotes()" style="display: none;">
                        <i class="fas fa-file-export"></i>
                    </button>
                    <button class="btn-import" onclick="importNotes()" style="display: none;">
                        <i class="fas fa-file-import"></i>
                    </button>
                </div>
                <textarea id="notas" class="notes" placeholder="Anote aqui..." oninput="saveNotas()"></textarea>
            </div>
            <!-- Dicas -->
            <div id="dicas" class="mensagem"></div>
            <div class="buttons">
                <button class="botao" onclick="redirecionar('Devocional')"><i class="fas fa-book" style="margin-right: 5px;"></i>Devocional</button>
                <button class="botao" onclick="redirecionar('Princípios')"><i class="fas fa-book" style="margin-right: 5px;"></i>Princípios</button>
                <button class="botao" onclick="redirecionar('Bíblia')"><i class="fas fa-book" style="margin-right: 5px;"></i> Bíblia</button>
                <button class="botao" onclick="redirecionar('Estudar')"><i class="fas fa-brain"></i> Estudar</button>
            </div>
        </div>
    </div>

    <!-- Inclui o script externo primeiro -->
    <script src="/Script/perfil-data.js"></script>
    <script src="/Script/nivel.js"></script>
    <script>
        let timeInSeconds = 0;
            let timerId;
            let isTimerRunning = false;
    
            function updateTimer() {
                const hours = Math.floor(timeInSeconds / 3600);
                const minutes = Math.floor((timeInSeconds % 3600) / 60);
                const seconds = timeInSeconds % 60;
    
                document.getElementById("timer").textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                timeInSeconds++;
            }
    
            function toggleTimer() {
                if (isTimerRunning) {
                    clearInterval(timerId);
                    isTimerRunning = false;
                    document.getElementById("startButton").innerHTML = '<i class="fas fa-play"></i> Iniciar';
                } else {
                    timerId = setInterval(updateTimer, 1000);
                    isTimerRunning = true;
                    document.getElementById("startButton").innerHTML = '<i class="fas fa-pause"></i> Pausar';
                }
            }
    
            function timerDone() {
                clearInterval(timerId);
                isTimerRunning = false;
                timeInSeconds = 0;
                document.getElementById("timer").textContent = "00:00:00";
                document.getElementById("startButton").innerHTML = '<i class="fas fa-play"></i> Iniciar';
    
                ganharXp(10);
                mostrarXpGanho(10);
            }
    
            function mostrarXpGanho(xp) {
                let xpElement = document.getElementById("xp-gain");
                xpElement.textContent = `+${xp} XP`;
                xpElement.style.display = "block";
                setTimeout(() => {
                    xpElement.style.display = "none";
                }, 1500);
            }

        // Função para salvar notas no perfil atual
function saveNotas() {
    const perfilAtivo = localStorage.getItem('perfilAtivo') || 'Main'; // Obtém o perfil ativo (ou 'Main' como padrão)
    var notas = document.getElementById('notas').value;

    // Salva as notas no localStorage, com a chave específica para o perfil ativo
    localStorage.setItem(`notas-${perfilAtivo}`, notas);
}

// Função para carregar notas do perfil ativo
function loadNotas() {
    const perfilAtivo = localStorage.getItem('perfilAtivo') || 'Main'; // Obtém o perfil ativo (ou 'Main' como padrão)
    var savedNotas = localStorage.getItem(`notas-${perfilAtivo}`); // Obtém as notas para o perfil ativo

    if (savedNotas) {
        document.getElementById('notas').value = savedNotas; // Carrega as notas no campo de texto
    }
}

// Chama a função loadNotas quando a página é carregada
window.onload = function() {
    // Timer
    document.getElementById("startButton").onclick = toggleTimer;
    document.getElementById("doneButton").onclick = timerDone;

    // Notas
    loadNotas();
    document.getElementById('notas').addEventListener('input', saveNotas);

    // Dicas
    changeTip();
    setInterval(changeTip, 300000);
};

// Certifique-se de chamar `saveNotas` quando o usuário alterar o campo de notas
document.getElementById('notas').addEventListener('input', saveNotas);

        // Array de dicas
        var dicas = [
            "Já fez um estudo bíblico hoje?",
            "Já leu a bíblia hoje?",
            "Já orou hoje?"
        ];

        // Função para mudar a dica exibida
        function changeTip() {
            var dicaAtual = Math.floor(Math.random() * dicas.length); // Seleciona uma dica aleatória
            document.getElementById('dicas').textContent = dicas[dicaAtual];
        }

        function redirecionar(destino) {
            switch (destino) {
                case 'Bíblia':
                    window.close('crist.html');
                    window.open('https://www.bibliaonline.com.br/acf');
                    break;
                case 'Estudar':
                    window.close('crist.html');
                    window.open('brain.html');
                    break;
                case 'Devocional':
                    window.close('crist.html');
                    window.open('https://www.youtube.com/watch?v=nR-QdUPKVao');
                    window.open('https://www.bibliaonline.com.br/acf');
                    window.open('https://drive.google.com/drive/folders/1Of9cNspUSobIUiQbsixEG3FlJYWAr3Ay');
                    window.open('https://drive.google.com/drive/folders/1h1QOxEjQRQfiobTXzsNvErYjPIsTV6t0');
                    break;
                case 'Princípios':
                    window.close('crist.html');
                    window.open('principio.html');
                    break;
                default:
                    break;
            }
        }

        function exportNotes() {
  const notes = document.getElementById('notas').value;
  const blob = new Blob([notes], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.setAttribute('href', url);
  a.setAttribute('download', 'crist.txt');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function importNotes() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.txt';
  input.onchange = () => {
    const reader = new FileReader();
    reader.onload = () => {
      document.getElementById('notas').value = reader.result;
      localStorage.setItem('notas', reader.result);
    };
    reader.readAsText(input.files[0]);
  };
  input.click();
}
    </script>
</body>
</html>
