<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="icon" href="icon.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessão de Alongamentos</title>
    <!-- Vincule a biblioteca Font Awesome (substitua com seu próprio link, se necessário) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #2B2B2B;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            width: 80%;
            max-width: 1200px;
            background-color: #2B2B2B;
        }

        .image-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .image-container img {
            width: 600px;
            max-width: 800px;
        }

        .content-container {
            flex: 2;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            color: white;
            text-align: center;
        }

        p {
            text-align: center;
            font-size: 18px;
        }

        .botao {
            background-color: #FFB800;
            color: rgb(0, 0, 0);
            border: none;
            padding: 20px; /* Ajustado para um valor igual em ambos os botões */
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 24px;
            margin: 4px;
            cursor: pointer;
            width: 310px;
            border-radius: 8px;
            margin-left: 120px;
        }

        .mensagem {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="image-container">
            <img src="https://static.vecteezy.com/ti/vetor-gratis/p1/17582369-conjunto-de-homem-de-treino-homem-fazendo-exercicios-de-fitness-alongamento-de-corpo-inteiro-aquecimento-e-alongamento-ilustracaoial-plana-isolada-no-fundo-branco-vetor.jpg" alt="Imagem de Alongamento" style="border-radius: 8px;">
        </div>

        <div class="video-container" style="margin-left: 20px;">
            <iframe id="youtubePlayer" width="560" height="315" src="https://www.youtube.com/embed/CS0UOeyLKNA?si=rGlhvmgzzVYxHJQc" title="YouTube video player" frameborder="0" allowfullscreen="" style="border-radius: 8px;"></iframe>
        </div>

        <div class="content-container" style="position: fixed; margin-left: 750px; margin-top: 300px;">
            <div style="display: flex;">
                <h1><i id="iconePeriodo" class="fas fa-sun" style="margin-right: 10px;"></i>Alongamentos</h1>

                <!-- Botão para copiar -->
                <button onclick="copiarTexto()" class="flex gap-1 items-center select-none py-1" aria-label="Copy" style="height: 10px; background: #2b2b2b; border: #333; color: white; margin-top: 25px;">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="icon-sm">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M7 5C7 3.34315 8.34315 2 10 2H19C20.6569 2 22 3.34315 22 5V14C22 15.6569 20.6569 17 19 17H17V19C17 20.6569 15.6569 22 14 22H5C3.34315 22 2 20.6569 2 19V10C2 8.34315 3.34315 7 5 7H7V5ZM9 7H14C15.6569 7 17 8.34315 17 10V15H19C19.5523 15 20 14.5523 20 14V5C20 4.44772 19.5523 4 19 4H10C9.44772 4 9 4.44772 9 5V7ZM5 9C4.44772 9 4 9.44772 4 10V19C4 19.5523 4.44772 20 5 20H14C14.5523 20 15 19.5523 15 19V10C15 9.44772 14.5523 9 14 9H5Z" fill="currentColor"></path>
                </svg></button>
            </div>

            <p id="alongamento1" style="margin: 10px;">Alongamento de quadríceps</p>
            <p id="alongamento2" style="margin: 10px;">Alongamento de pescoço</p>
            <p id="alongamento3" style="margin: 10px;">Alongamento das pernas</p>
            <p id="alongamento4" style="margin: 10px;">Alongamento de costas</p>
            <p id="alongamento5" style="margin: 10px;">Alongamento Ponte</p>
        </div>
    </div>

    <script>
        function definirPeriodo(){

    let hora = new Date().getHours();
    let icone = document.getElementById("iconePeriodo");
    let player = document.getElementById("youtubePlayer");

    // Dia (5h até 17h)
    if(hora >= 5 && hora < 17){

        icone.className = "fas fa-sun";
        player.src = "https://www.youtube.com/embed/CS0UOeyLKNA?si=rGlhvmgzzVYxHJQc";

    }

    // Noite (17h até 5h)
    else{

        icone.className = "fas fa-moon";
        player.src = "https://www.youtube.com/embed/_Wq2EB_ZsRc?si=BIhGuR2MNzJoE_tA";

    }

}

// roda automaticamente quando a página abre
definirPeriodo();

        function copiarTexto() {
        // Seleciona o texto dos parágrafos
        let texto = '';
        texto += document.getElementById('alongamento1').innerText + '\n';
        texto += document.getElementById('alongamento2').innerText + '\n';
        texto += document.getElementById('alongamento3').innerText + '\n';
        texto += document.getElementById('alongamento4').innerText + '\n';
        texto += document.getElementById('alongamento5').innerText + '\n';

        // Cria um elemento temporário para copiar o texto
        let tempTextArea = document.createElement('textarea');
        tempTextArea.value = texto;
        document.body.appendChild(tempTextArea);

        // Seleciona e copia o texto
        tempTextArea.select();
        document.execCommand('copy');

        // Remove o elemento temporário
        document.body.removeChild(tempTextArea);

        // Alerta ou notificação que o texto foi copiado
        alert("Lista de alongamentos copiada!");
    }
    </script>

</body>
</html>
